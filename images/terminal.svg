<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 340" width="820" height="340">
  <style>
    @keyframes t1  { 0%, 8%  { opacity: 0 } 9%, 100%  { opacity: 1 } }
    @keyframes t2  { 0%, 14% { opacity: 0 } 15%, 100% { opacity: 1 } }
    @keyframes t3  { 0%, 22% { opacity: 0 } 23%, 100% { opacity: 1 } }
    @keyframes t4  { 0%, 30% { opacity: 0 } 31%, 100% { opacity: 1 } }
    @keyframes t5  { 0%, 38% { opacity: 0 } 39%, 100% { opacity: 1 } }
    @keyframes t6  { 0%, 46% { opacity: 0 } 47%, 100% { opacity: 1 } }
    @keyframes t7  { 0%, 54% { opacity: 0 } 55%, 100% { opacity: 1 } }
    @keyframes t8  { 0%, 62% { opacity: 0 } 63%, 100% { opacity: 1 } }
    @keyframes t9  { 0%, 70% { opacity: 0 } 71%, 100% { opacity: 1 } }
    @keyframes t10 { 0%, 78% { opacity: 0 } 79%, 100% { opacity: 1 } }
    @keyframes blink { 0%, 49% { opacity: 1 } 50%, 100% { opacity: 0 } }

    .l1  { animation: t1  4s ease-out forwards; opacity: 0; }
    .l2  { animation: t2  4s ease-out forwards; opacity: 0; }
    .l3  { animation: t3  4s ease-out forwards; opacity: 0; }
    .l4  { animation: t4  4s ease-out forwards; opacity: 0; }
    .l5  { animation: t5  4s ease-out forwards; opacity: 0; }
    .l6  { animation: t6  4s ease-out forwards; opacity: 0; }
    .l7  { animation: t7  4s ease-out forwards; opacity: 0; }
    .l8  { animation: t8  4s ease-out forwards; opacity: 0; }
    .l9  { animation: t9  4s ease-out forwards; opacity: 0; }
    .l10 { animation: t10 4s ease-out forwards; opacity: 0; }

    .cmd  { fill: #c8d3f5; }
    .out  { fill: #7a88a8; }
    .hl   { fill: #a78bfa; }
    .grn  { fill: #6ee7b7; }
    .dim  { fill: #4a5568; }
    .cursor { animation: blink 1s step-end infinite; }
  </style>

  <!-- Window chrome -->
  <rect width="820" height="340" rx="10" fill="#0d1117"/>
  <rect width="820" height="36" rx="10" fill="#161b22"/>
  <rect y="26" width="820" height="10" fill="#161b22"/>
  <circle cx="20" cy="18" r="6" fill="#ff5f57"/>
  <circle cx="40" cy="18" r="6" fill="#febc2e"/>
  <circle cx="60" cy="18" r="6" fill="#28c840"/>
  <text x="410" y="22" text-anchor="middle" font-family="'SF Mono','JetBrains Mono','Fira Code',monospace" font-size="12" fill="#7a88a8">avikalp — zsh</text>

  <!-- Terminal content -->
  <g font-family="'SF Mono','JetBrains Mono','Fira Code',monospace" font-size="13.5">

    <!-- whoami -->
    <g class="l1">
      <text x="24" y="68"><tspan class="grn">❯</tspan><tspan class="cmd"> whoami</tspan></text>
    </g>
    <g class="l2">
      <text x="24" y="90"><tspan class="hl">Avikalp Karrahe</tspan><tspan class="out"> — Founding Engineer</tspan></text>
    </g>

    <!-- cat current -->
    <g class="l3">
      <text x="24" y="122"><tspan class="grn">❯</tspan><tspan class="cmd"> cat role.txt</tspan></text>
    </g>
    <g class="l4">
      <text x="24" y="144"><tspan class="out">Voice AI startup · Palo Alto · Employee #1</tspan></text>
    </g>
    <g class="l5">
      <text x="24" y="164"><tspan class="out">Scaled core product from 0 → production</tspan></text>
    </g>

    <!-- ls awards -->
    <g class="l6">
      <text x="24" y="196"><tspan class="grn">❯</tspan><tspan class="cmd"> ls awards/</tspan></text>
    </g>
    <g class="l7">
      <text x="24" y="218"><tspan class="hl">AgentHacks_Winner</tspan><tspan class="out">  </tspan><tspan class="hl">GitHub_HackNight_2nd</tspan><tspan class="out">  </tspan><tspan class="hl">Daytona_Judge</tspan></text>
    </g>
    <g class="l8">
      <text x="24" y="238"><tspan class="hl">Coca-Cola_AI</tspan><tspan class="out">       </tspan><tspan class="hl">6_awards_in_12_months</tspan></text>
    </g>

    <!-- uptime -->
    <g class="l9">
      <text x="24" y="270"><tspan class="grn">❯</tspan><tspan class="cmd"> uptime</tspan></text>
    </g>
    <g class="l10">
      <text x="24" y="292"><tspan class="out">3+ yrs · real-time ML pipelines · production AI systems</tspan></text>
    </g>

    <!-- prompt + cursor -->
    <g class="l10">
      <text x="24" y="322"><tspan class="grn">❯</tspan></text>
      <rect class="cursor" x="38" y="310" width="8" height="16" rx="1" fill="#a78bfa"/>
    </g>

  </g>
</svg>