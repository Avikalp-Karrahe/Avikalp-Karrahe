<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f"/>
      <stop offset="50%" style="stop-color:#0d0d1a"/>
      <stop offset="100%" style="stop-color:#0a0a0f"/>
    </linearGradient>
    <linearGradient id="waveGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="25%" style="stop-color:#8b5cf6"/>
      <stop offset="50%" style="stop-color:#a78bfa"/>
      <stop offset="75%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#6366f1"/>
    </linearGradient>
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#818cf8"/>
      <stop offset="50%" style="stop-color:#c4b5fd"/>
      <stop offset="100%" style="stop-color:#818cf8"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#8b5cf6;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="scanline" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:0"/>
      <stop offset="45%" style="stop-color:#8b5cf6;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#8b5cf6;stop-opacity:0.08"/>
      <stop offset="55%" style="stop-color:#8b5cf6;stop-opacity:0"/>
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="textGlow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="blur" in2="SourceGraphic" operator="over"/>
    </filter>
    <clipPath id="clip">
      <rect x="0" y="0" width="1200" height="400"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g opacity="0.03">
    <line x1="0" y1="100" x2="1200" y2="100" stroke="#8b5cf6" stroke-width="0.5"/>
    <line x1="0" y1="200" x2="1200" y2="200" stroke="#8b5cf6" stroke-width="0.5"/>
    <line x1="0" y1="300" x2="1200" y2="300" stroke="#8b5cf6" stroke-width="0.5"/>
    <line x1="200" y1="0" x2="200" y2="400" stroke="#8b5cf6" stroke-width="0.5"/>
    <line x1="400" y1="0" x2="400" y2="400" stroke="#8b5cf6" stroke-width="0.5"/>
    <line x1="600" y1="0" x2="600" y2="400" stroke="#8b5cf6" stroke-width="0.5"/>
    <line x1="800" y1="0" x2="800" y2="400" stroke="#8b5cf6" stroke-width="0.5"/>
    <line x1="1000" y1="0" x2="1000" y2="400" stroke="#8b5cf6" stroke-width="0.5"/>
  </g>

  <!-- Scanline effect -->
  <rect width="1200" height="400" fill="url(#scanline)" clip-path="url(#clip)">
    <animateTransform attributeName="transform" type="translate" values="0,-400;0,400" dur="4s" repeatCount="indefinite"/>
  </rect>

  <!-- Floating particles -->
  <g opacity="0.4">
    <circle cx="100" cy="80" r="1.2" fill="#818cf8">
      <animate attributeName="cy" values="80;60;80" dur="6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.2;0.6;0.2" dur="6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="250" cy="320" r="0.8" fill="#a78bfa">
      <animate attributeName="cy" values="320;290;320" dur="5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.3;0.7;0.3" dur="5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="400" cy="50" r="1" fill="#c4b5fd">
      <animate attributeName="cy" values="50;30;50" dur="7s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.1;0.5;0.1" dur="7s" repeatCount="indefinite"/>
    </circle>
    <circle cx="750" cy="350" r="1.5" fill="#818cf8">
      <animate attributeName="cy" values="350;320;350" dur="4.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.2;0.5;0.2" dur="4.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="900" cy="70" r="0.9" fill="#a78bfa">
      <animate attributeName="cy" values="70;50;70" dur="5.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.3;0.6;0.3" dur="5.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1050" cy="280" r="1.1" fill="#c4b5fd">
      <animate attributeName="cy" values="280;260;280" dur="6.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.2;0.6;0.2" dur="6.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="550" cy="360" r="0.7" fill="#818cf8">
      <animate attributeName="cy" values="360;340;360" dur="8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.1;0.4;0.1" dur="8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1150" cy="150" r="1.3" fill="#a78bfa">
      <animate attributeName="cy" values="150;130;150" dur="5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.2;0.5;0.2" dur="5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="50" cy="220" r="0.6" fill="#c4b5fd">
      <animate attributeName="cy" values="220;200;220" dur="7s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.3;0.7;0.3" dur="7s" repeatCount="indefinite"/>
    </circle>
    <circle cx="680" cy="40" r="1" fill="#818cf8">
      <animate attributeName="cy" values="40;25;40" dur="6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.2;0.6;0.2" dur="6s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Horizontal accent lines -->
  <line x1="0" y1="200" x2="1200" y2="200" stroke="url(#lineGrad)" stroke-width="0.5" opacity="0.5"/>

  <!-- Voice waveform bars - left side -->
  <g transform="translate(180, 200)" filter="url(#glow)" opacity="0.7">
    <rect x="0" y="-15" width="3" height="30" rx="1.5" fill="url(#waveGrad)">
      <animate attributeName="height" values="30;60;20;50;30" dur="1.8s" repeatCount="indefinite"/>
      <animate attributeName="y" values="-15;-30;-10;-25;-15" dur="1.8s" repeatCount="indefinite"/>
    </rect>
    <rect x="8" y="-25" width="3" height="50" rx="1.5" fill="url(#waveGrad)">
      <animate attributeName="height" values="50;20;70;35;50" dur="1.4s" repeatCount="indefinite"/>
      <animate attributeName="y" values="-25;-10;-35;-17;-25" dur="1.4s" repeatCount="indefinite"/>
    </rect>
    <rect x="16" y="-35" width="3" height="70" rx="1.5" fill="url(#waveGrad)">
      <animate attributeName="height" values="70;40;80;55;70" dur="1.6s" repeatCount="indefinite"/>
      <animate attributeName="y" values="-35;-20;-40;-27;-35" dur="1.6s" repeatCount="indefinite"/>
    </rect>
    <rect x="24" y="-20" width="3" height="40" rx="1.5" fill="url(#waveGrad)">
      <animate attributeName="height" values="40;70;25;55;40" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="y" values="-20;-35;-12;-27;-20" dur="2s" repeatCount="indefinite"/>
    </rect>
    <rect x="32" y="-40" width="3" height="80" rx="1.5" fill="url(#waveGrad)">
      <animate attributeName="height" values="80;30;65;45;80" dur="1.5s" repeatCount="indefinite"/>
      <animate attributeName="y" values="-40;-15;-32;-22;-40" dur="1.5s" repeatCount="indefinite"/>
    </rect>
    <rect x="40" y="-10" width="3" height="20" rx="1.5" fill="url(#waveGrad)">
      <animate attributeName="height" values="20;50;30;60;20" dur="1.7s" repeatCount="indefinite"/>
      <animate attributeName="y" values="-10;-25;-15;-30;-10" dur="1.7s" repeatCount="indefinite"/>
    </rect>
    <rect x="48" y="-30" width="3" height="60" rx="1.5" fill="url(#waveGrad)">
      <animate attributeName="height" values="60;25;75;40;60" dur="1.3s" repeatCount="indefinite"/>
      <animate attributeName="y" values="-30;-12;-37;-20;-30" dur="1.3s" repeatCount="indefinite"/>
    </rect>
    <rect x="56" y="-18" width="3" height="36" rx="1.5" fill="url(#waveGrad)">
      <animate attributeName="height" values="36;65;28;50;36" dur="1.9s" repeatCount="indefinite"/>
      <animate attributeName="y" values="-18;-32;-14;-25;-18" dur="1.9s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- Voice waveform bars - right side (mirrored) -->
  <g transform="translate(960, 200)" filter="url(#glow)" opacity="0.7">
    <rect x="0" y="-18" width="3" height="36" rx="1.5" fill="url(#waveGrad)">
      <animate attributeName="height" values="36;65;28;50;36" dur="1.9s" repeatCount="indefinite"/>
      <animate attributeName="y" values="-18;-32;-14;-25;-18" dur="1.9s" repeatCount="indefinite"/>
    </rect>
    <rect x="8" y="-30" width="3" height="60" rx="1.5" fill="url(#waveGrad)">
      <animate attributeName="height" values="60;25;75;40;60" dur="1.3s" repeatCount="indefinite"/>
      <animate attributeName="y" values="-30;-12;-37;-20;-30" dur="1.3s" repeatCount="indefinite"/>
    </rect>
    <rect x="16" y="-10" width="3" height="20" rx="1.5" fill="url(#waveGrad)">
      <animate attributeName="height" values="20;50;30;60;20" dur="1.7s" repeatCount="indefinite"/>
      <animate attributeName="y" values="-10;-25;-15;-30;-10" dur="1.7s" repeatCount="indefinite"/>
    </rect>
    <rect x="24" y="-40" width="3" height="80" rx="1.5" fill="url(#waveGrad)">
      <animate attributeName="height" values="80;30;65;45;80" dur="1.5s" repeatCount="indefinite"/>
      <animate attributeName="y" values="-40;-15;-32;-22;-40" dur="1.5s" repeatCount="indefinite"/>
    </rect>
    <rect x="32" y="-20" width="3" height="40" rx="1.5" fill="url(#waveGrad)">
      <animate attributeName="height" values="40;70;25;55;40" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="y" values="-20;-35;-12;-27;-20" dur="2s" repeatCount="indefinite"/>
    </rect>
    <rect x="40" y="-35" width="3" height="70" rx="1.5" fill="url(#waveGrad)">
      <animate attributeName="height" values="70;40;80;55;70" dur="1.6s" repeatCount="indefinite"/>
      <animate attributeName="y" values="-35;-20;-40;-27;-35" dur="1.6s" repeatCount="indefinite"/>
    </rect>
    <rect x="48" y="-25" width="3" height="50" rx="1.5" fill="url(#waveGrad)">
      <animate attributeName="height" values="50;20;70;35;50" dur="1.4s" repeatCount="indefinite"/>
      <animate attributeName="y" values="-25;-10;-35;-17;-25" dur="1.4s" repeatCount="indefinite"/>
    </rect>
    <rect x="56" y="-15" width="3" height="30" rx="1.5" fill="url(#waveGrad)">
      <animate attributeName="height" values="30;60;20;50;30" dur="1.8s" repeatCount="indefinite"/>
      <animate attributeName="y" values="-15;-30;-10;-25;-15" dur="1.8s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- Main name text with glow -->
  <text x="600" y="175" text-anchor="middle" font-family="'SF Pro Display', 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif" font-size="52" font-weight="700" letter-spacing="3" fill="url(#glowGrad)" filter="url(#softGlow)">
    AVIKALP KARRAHE
  </text>

  <!-- Subtitle -->
  <text x="600" y="215" text-anchor="middle" font-family="'SF Mono', 'JetBrains Mono', 'Fira Code', monospace" font-size="14" letter-spacing="6" fill="#6366f1" opacity="0.8">
    FOUNDING ENGINEER
  </text>

  <!-- Animated typing line -->
  <g transform="translate(600, 250)">
    <text x="0" y="0" text-anchor="middle" font-family="'SF Mono', 'JetBrains Mono', 'Fira Code', monospace" font-size="13" fill="#a78bfa" opacity="0.6" letter-spacing="2">
      VOICE AI  ·  ML PIPELINES  ·  PRODUCTION SYSTEMS  ·  AGI
    </text>
  </g>

  <!-- Blinking cursor -->
  <rect x="845" y="238" width="2" height="16" fill="#a78bfa">
    <animate attributeName="opacity" values="1;0;1" dur="1.2s" repeatCount="indefinite"/>
  </rect>

  <!-- Bottom accent line with pulse -->
  <line x1="350" y1="290" x2="850" y2="290" stroke="url(#lineGrad)" stroke-width="1" opacity="0.4"/>
  <circle cx="600" cy="290" r="2" fill="#8b5cf6" opacity="0.6">
    <animate attributeName="r" values="2;4;2" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;0.2;0.6" dur="2s" repeatCount="indefinite"/>
  </circle>

  <!-- Corner accents -->
  <g opacity="0.15">
    <path d="M 30 30 L 30 60 M 30 30 L 60 30" stroke="#6366f1" stroke-width="1.5" fill="none"/>
    <path d="M 1170 30 L 1170 60 M 1170 30 L 1140 30" stroke="#6366f1" stroke-width="1.5" fill="none"/>
    <path d="M 30 370 L 30 340 M 30 370 L 60 370" stroke="#6366f1" stroke-width="1.5" fill="none"/>
    <path d="M 1170 370 L 1170 340 M 1170 370 L 1140 370" stroke="#6366f1" stroke-width="1.5" fill="none"/>
  </g>

  <!-- Status indicators bottom -->
  <g transform="translate(600, 340)" opacity="0.4">
    <circle cx="-80" cy="0" r="3" fill="#22c55e">
      <animate attributeName="opacity" values="0.4;1;0.4" dur="2s" repeatCount="indefinite"/>
    </circle>
    <text x="-68" y="4" font-family="'SF Mono', 'JetBrains Mono', monospace" font-size="10" fill="#6b7280" letter-spacing="1">ONLINE</text>
    <circle cx="30" cy="0" r="3" fill="#8b5cf6">
      <animate attributeName="opacity" values="0.4;1;0.4" dur="3s" repeatCount="indefinite"/>
    </circle>
    <text x="42" y="4" font-family="'SF Mono', 'JetBrains Mono', monospace" font-size="10" fill="#6b7280" letter-spacing="1">BUILDING</text>
  </g>
</svg>