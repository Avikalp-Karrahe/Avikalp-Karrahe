name: Generate Voice Waveform

on:
  schedule:
    - cron: "0 6 * * *"  # daily at 6am UTC
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate waveform SVG
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
        run: python scripts/generate_waveform.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add images/waveform.svg
          git diff --cached --quiet || git commit -m "Update voice waveform [bot]"
          git push
